<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Jogo da Forca</h1>

        <div id="palavra">_ _ _ _</div>

        <p id="erros">Erros: 0/6</p>

        <input
            type="text"
            id="letra"
            maxlength="1"
            placeholder="Digite uma letra"
        >

        <br><br>

        <button onclick="jogar()">Enviar</button>

        <button onclick="novaPartida()">Nova Partida</button>

        <p id="mensagem"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
